<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sales Analytics & Prediction Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#121212;
      color:#ffffff;
    }

    .auth-card{
      width:430px;
      background:#1e1e1e;
      border:1px solid #2f2f2f;
      border-radius:12px;
      padding:40px;
      box-shadow:0 15px 40px rgba(0,0,0,.45);
    }

    .auth-title{
      text-align:center;
      font-size:32px;
      font-weight:700;
      color:#ffffff;
      margin-bottom:10px;
    }

    .auth-subtitle{
      text-align:center;
      color:#a1a1aa;
      margin-bottom:35px;
      font-size:15px;
    }

    .alert{
      display:none;
      padding:12px;
      border-radius:8px;
      margin-bottom:20px;
      font-size:14px;
    }

    .alert-error{
      background:#3b0d11;
      border:1px solid #dc3545;
      color:#ffb3ba;
    }

    .alert-success{
      background:#0d3b1e;
      border:1px solid #198754;
      color:#b3ffc2;
    }

    .form-group{
      margin-bottom:22px;
    }

    .form-label{
      display:block;
      margin-bottom:8px;
      font-weight:500;
      color:#ffffff;
    }

    .form-input{
      width:100%;
      padding:13px 15px;
      border-radius:8px;
      border:1px solid #3a3a3a;
      background:#2a2a2a;
      color:#ffffff;
      font-size:15px;
      transition:.2s;
    }

    .form-input::placeholder{
      color:#8b8b8b;
    }

    .form-input:focus{
      outline:none;
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.2);
    }

    .btn-submit{
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:#ffffff;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:.2s;
      margin-top:8px;
    }

    .btn-submit:hover{
      background:#2563eb;
    }

    .auth-footer{
      text-align:center;
      margin-top:30px;
      color:#a1a1aa;
      font-size:15px;
    }

    .auth-footer a{
      color:#60a5fa;
      text-decoration:none;
      font-weight:600;
    }

    .auth-footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Login to access your sales predictions</p>

    <!-- Error/Success notification banner -->
    <div id="alert-box" class="alert"></div>

    <form action="/auth/login" method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button class="btn-submit">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const success = urlParams.get('success');
    const alertBox = document.getElementById('alert-box');

    if (error) {
      alertBox.innerText = error;
      alertBox.className = "alert alert-error";
      alertBox.style.display = "block";
    } else if (success) {
      alertBox.innerText = success;
      alertBox.className = "alert alert-success";
      alertBox.style.display = "block";
    }
  </script>
</body>
</html>
