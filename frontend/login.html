<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sales Analytics & Prediction Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Force sleek dark theme values by default */
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #f8f9fa;
      --text-muted: #a0a0a0;
      --border-color: #2d2d2d;
      --primary-color: #3b82f6;
      --primary-hover: #60a5fa;
      --transition-speed: 0.15s;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    /* Sleek card container */
    .auth-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    
    .auth-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
      color: var(--text-main);
    }
    
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-main);
    }
    
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: #2a2a2a; /* Slightly lighter gray for typing contrast */
      color: #ffffff;
      box-sizing: border-box;
      font-size: 14px;
      font-family: inherit;
      transition: border-color var(--transition-speed) ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    
    /* Sleek blue login button */
    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
      transition: background-color var(--transition-speed) ease;
    }
    
    .btn-submit:hover {
      background-color: var(--primary-hover);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .auth-footer a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
    
    .auth-footer a:hover {
      text-decoration: underline;
    }
    
    /* Error and success banner layouts */
    .alert {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    
    .alert-error {
      background-color: rgba(220, 53, 69, 0.15);
      border: 1px solid #dc3545;
      color: #ea868f;
    }
    
    .alert-success {
      background-color: rgba(25, 135, 84, 0.15);
      border: 1px solid #198754;
      color: #75b798;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Login to access your sales predictions</p>

    <!-- Error/Success notification banner -->
    <div id="alert-box" class="alert"></div>

    <form action="/auth/login" method="POST">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    // Extract query parameters from URL redirects
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const success = urlParams.get('success');
    const alertBox = document.getElementById('alert-box');

    if (error) {
      alertBox.innerText = error;
      alertBox.className = "alert alert-error";
      alertBox.style.display = "block";
    } else if (success) {
      alertBox.innerText = success;
      alertBox.className = "alert alert-success";
      alertBox.style.display = "block";
    }
  </script>
</body>
</html>
